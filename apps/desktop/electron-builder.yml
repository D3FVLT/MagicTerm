appId: com.magicterm.app
productName: Magic Term
artifactName: "MagicTerm-${version}-${arch}.${ext}"
icon: build/icon.png
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!**/*.map"
asarUnpack:
  - "**/*.node"
npmRebuild: false
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
publish:
  provider: github
  releaseType: release
