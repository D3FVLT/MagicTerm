appId: com.magicterm.app
productName: Magic Term
artifactName: "MagicTerm-${version}-${arch}.${ext}"
icon: build/icon.png
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!**/*.map"
asarUnpack:
  - "**/*.node"
npmRebuild: false
afterPack: ./scripts/afterPack.cjs
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  # SECURITY KNOWN GAP: identity is currently null which means builds are
  # **unsigned and unnotarized**. Auto-update integrity therefore relies
  # solely on the GitHub release URL + electron-updater's blockmap hash.
  # To sign + notarize for production, set environment variables and switch
  # to:
  #   identity: "Developer ID Application: Your Name (TEAMID)"
  #   notarize:
  #     teamId: "TEAMID"
  # and provide APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  # via the build environment. See electron-builder docs:
  # https://www.electron.build/code-signing-mac
  identity: null
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
publish:
  provider: github
  releaseType: release
