<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy: app shell loads only same-origin assets, talks
      to Supabase over HTTPS/WSS, and pulls Google Fonts. Inline styles are
      allowed because Tailwind, xterm.js and several modal libs inject style
      attributes; inline scripts are forbidden so a renderer XSS cannot
      execute attacker-controlled JS via injected <script> tags or event
      handlers. 'connect-src' is also restricted to Supabase to stop a
      compromised renderer from beaconing tokens to a third-party origin.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self';"
    />
    <title>Magic Term</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="background-color: #1a1b26;" class="text-gray-100">
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
