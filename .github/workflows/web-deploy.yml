name: Deploy Web

# Triggers:
# - Pushes to `main` that touch the website (or shared workspace files).
# - Manual dispatch.
#
# This workflow is intentionally separate from release.yml. release.yml
# triggers only on `v*` tags, so version bumps and tags will keep building
# the desktop app. Web changes pushed to main will only run THIS workflow,
# never the desktop release pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/web-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (web only)
        run: pnpm install --frozen-lockfile --filter @magicterm/web...

      - name: Build site
        run: pnpm --filter @magicterm/web build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=magicterm --branch=main
