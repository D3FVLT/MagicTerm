name: Deploy Web (manual)

# Cloudflare Workers Builds (Git integration) handles automatic deploys on
# every push to main. This workflow is a manual fallback — useful if you ever
# want to redeploy from a fork, a different branch, or without touching
# Cloudflare's Git integration.
#
# To use it, set repository secrets `CLOUDFLARE_API_TOKEN` and
# `CLOUDFLARE_ACCOUNT_ID`, then trigger from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @magicterm/web...

      - name: Build site
        run: pnpm --filter @magicterm/web build

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @magicterm/web exec wrangler deploy
