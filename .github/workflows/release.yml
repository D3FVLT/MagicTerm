name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update package.json versions
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          node -e "const pkg=require('./package.json'); pkg.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2)+'\n')"
          node -e "const pkg=require('./apps/desktop/package.json'); pkg.version='$VERSION'; require('fs').writeFileSync('apps/desktop/package.json', JSON.stringify(pkg, null, 2)+'\n')"
          echo "Updated versions to $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build (macOS)
        if: matrix.platform == 'mac'
        run: pnpm --filter @magicterm/desktop dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PUBLISH: never

      - name: Build (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          cd apps/desktop
          npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd apps/desktop
          npx electron-builder --linux AppImage deb --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts directory"

      - name: Delete existing release
        run: |
          gh release delete v${{ steps.version.outputs.VERSION }} --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Magic Term v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: artifacts/*
          body: |
            ## Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | **Windows** | x64 | [MagicTerm-${{ steps.version.outputs.VERSION }}-x64.exe](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-x64.exe) |
            | **macOS** | Intel (x64) | [MagicTerm-${{ steps.version.outputs.VERSION }}-x64.dmg](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-x64.dmg) |
            | **macOS** | Apple Silicon (ARM64) | [MagicTerm-${{ steps.version.outputs.VERSION }}-arm64.dmg](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-arm64.dmg) |
            | **Linux** | x64 | [MagicTerm-${{ steps.version.outputs.VERSION }}-x64.AppImage](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-x64.AppImage) |
            | **Linux** | x64 (deb) | [magicterm_${{ steps.version.outputs.VERSION }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/magicterm_${{ steps.version.outputs.VERSION }}_amd64.deb) |

            ---

            ### First time on macOS?

            After downloading, if you see "Magic Term is damaged", run:
            ```bash
            xattr -cr /Applications/Magic\ Term.app
            ```

            ### Linux Installation

            **AppImage:**
            ```bash
            chmod +x MagicTerm-*.AppImage
            ./MagicTerm-*.AppImage
            ```

            **Debian/Ubuntu:**
            ```bash
            sudo dpkg -i magicterm_*.deb
            ```

            ### Auto-updates

            - **Windows**: Auto-updates enabled (silent install)
            - **macOS**: Manual download required (notification will appear)
            - **Linux**: Manual download required

            ---

            <details>
            <summary>All assets (for auto-updater)</summary>

            - `latest.yml` / `latest-mac.yml` / `latest-linux.yml` — update metadata
            - `*.zip` — used by auto-updater on macOS
            - `*.blockmap` — for delta updates

            </details>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check if AUR secrets are set
        id: check-secrets
        run: |
          if [ -z "${{ secrets.AUR_SSH_PRIVATE_KEY }}" ]; then
            echo "AUR_SSH_PRIVATE_KEY not set, skipping AUR publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Get version
        if: steps.check-secrets.outputs.skip != 'true'
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download AppImage for checksum
        if: steps.check-secrets.outputs.skip != 'true'
        id: checksum
        run: |
          wget -q "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-x64.AppImage"
          SHA256=$(sha256sum "MagicTerm-${{ steps.version.outputs.VERSION }}-x64.AppImage" | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Setup SSH
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur_key" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repo
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          git clone ssh://aur@aur.archlinux.org/magicterm-bin.git aur-repo || git init aur-repo

      - name: Update PKGBUILD
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          cd aur-repo
          cat > PKGBUILD << 'EOF'
          # Maintainer: MagicTerm <magicterm@users.noreply.github.com>
          pkgname=magicterm-bin
          pkgver=${{ steps.version.outputs.VERSION }}
          pkgrel=1
          pkgdesc="Cross-platform SSH/SFTP client with E2E encryption"
          arch=('x86_64')
          url="https://github.com/D3FVLT/MagicTerm"
          license=('MIT')
          depends=('gtk3' 'nss' 'libxss' 'libsecret')
          provides=('magicterm')
          conflicts=('magicterm')
          options=('!strip')
          source=("${pkgname}-${pkgver}.AppImage::https://github.com/D3FVLT/MagicTerm/releases/download/v${pkgver}/MagicTerm-${pkgver}-x64.AppImage")
          sha256sums=('${{ steps.checksum.outputs.SHA256 }}')

          prepare() {
              chmod +x "${pkgname}-${pkgver}.AppImage"
              "./${pkgname}-${pkgver}.AppImage" --appimage-extract
          }

          package() {
              install -dm755 "${pkgdir}/opt/${pkgname}"
              cp -r squashfs-root/* "${pkgdir}/opt/${pkgname}/"
              
              install -dm755 "${pkgdir}/usr/bin"
              ln -s "/opt/${pkgname}/magic-term" "${pkgdir}/usr/bin/magicterm"
              
              if [ -f "squashfs-root/magic-term.desktop" ]; then
                  install -Dm644 "squashfs-root/magic-term.desktop" "${pkgdir}/usr/share/applications/magicterm.desktop"
              fi
              
              for size in 16 32 48 64 128 256 512; do
                  if [ -f "squashfs-root/usr/share/icons/hicolor/${size}x${size}/apps/magic-term.png" ]; then
                      install -Dm644 "squashfs-root/usr/share/icons/hicolor/${size}x${size}/apps/magic-term.png" \
                          "${pkgdir}/usr/share/icons/hicolor/${size}x${size}/apps/magicterm.png"
                  fi
              done
          }
          EOF

      - name: Generate .SRCINFO
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          cd aur-repo
          cat > .SRCINFO << EOF
          pkgbase = magicterm-bin
          	pkgdesc = Cross-platform SSH/SFTP client with E2E encryption
          	pkgver = ${{ steps.version.outputs.VERSION }}
          	pkgrel = 1
          	url = https://github.com/D3FVLT/MagicTerm
          	arch = x86_64
          	license = MIT
          	depends = gtk3
          	depends = nss
          	depends = libxss
          	depends = libsecret
          	provides = magicterm
          	conflicts = magicterm
          	options = !strip
          	source = magicterm-bin-${{ steps.version.outputs.VERSION }}.AppImage::https://github.com/D3FVLT/MagicTerm/releases/download/v${{ steps.version.outputs.VERSION }}/MagicTerm-${{ steps.version.outputs.VERSION }}-x64.AppImage
          	sha256sums = ${{ steps.checksum.outputs.SHA256 }}

          pkgname = magicterm-bin
          EOF

      - name: Push to AUR
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          cd aur-repo
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git config user.name "MagicTerm Bot"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin master || git push origin main || echo "Push failed - repo may not exist yet"
