<!doctype html>
<html lang="en">
  <body style="margin:0;padding:0;background:#0a0b14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;color:#c0caf5;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#0a0b14;padding:40px 20px;">
      <tr>
        <td align="center">
          <table role="presentation" width="520" cellspacing="0" cellpadding="0" border="0" style="background:#11121d;border:1px solid #292e42;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:32px 40px 16px;">
                <div style="display:inline-flex;align-items:center;gap:10px;">
                  <span style="display:inline-block;width:32px;height:32px;background:#7aa2f7;border-radius:8px;text-align:center;line-height:32px;font-weight:700;color:#0a0b14;">M</span>
                  <span style="font-weight:600;font-size:18px;color:#c0caf5;">Magic Term</span>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 40px 24px;">
                <h1 style="margin:0 0 12px;font-size:24px;font-weight:700;color:#c0caf5;letter-spacing:-0.01em;">
                  You've been invited
                </h1>
                <p style="margin:0 0 24px;color:#a9b1d6;font-size:15px;line-height:1.6;">
                  You've been invited to join a Magic Term workspace. Accept the invite below to set up your
                  account and start collaborating.
                </p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#7aa2f7;color:#0a0b14;text-decoration:none;padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;">
                  Accept invite
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 40px 32px;border-top:1px solid #292e42;">
                <p style="margin:0;color:#565f89;font-size:11px;line-height:1.5;">
                  Magic Term · <a href="https://magicterm.app" style="color:#7aa2f7;text-decoration:none;">magicterm.app</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
